<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 200" fill="none">
  <!-- Stethoscope earpieces -->
  <ellipse cx="198" cy="28" rx="12" ry="8" fill="rgba(39,174,96,0.18)" transform="rotate(-30 198 28)"/>
  <ellipse cx="226" cy="28" rx="12" ry="8" fill="rgba(39,174,96,0.18)" transform="rotate(30 226 28)"/>
  <!-- Ear tubes converging -->
  <line x1="198" y1="34" x2="212" y2="56" stroke="rgba(39,174,96,0.18)" stroke-width="7" stroke-linecap="round"/>
  <line x1="226" y1="34" x2="212" y2="56" stroke="rgba(39,174,96,0.18)" stroke-width="7" stroke-linecap="round"/>
  <!-- Main tube curving down -->
  <path d="M212 56 Q210 102 206 132 Q201 156 220 164 Q242 172 250 150 Q258 134 250 118"
        stroke="rgba(39,174,96,0.18)" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Chest piece (diaphragm) -->
  <circle cx="250" cy="116" r="27" fill="rgba(39,174,96,0.14)" stroke="rgba(39,174,96,0.2)" stroke-width="5"/>
  <!-- Cross on chest piece -->
  <rect x="242" y="110" width="16" height="12" rx="3" fill="rgba(39,174,96,0.3)"/>
  <rect x="244" y="108" width="12" height="16" rx="3" fill="rgba(39,174,96,0.3)"/>

  <!-- Heart with paw print -->
  <path fill="rgba(39,174,96,0.12)" d="M92 66 C92 54,74 42,63 54 C52 42,34 54,34 66 C34 89,63 107,63 107 C63 107,92 89,92 66 Z"/>
  <g fill="rgba(39,174,96,0.22)" transform="translate(63,76)">
    <ellipse cx="0" cy="7" rx="10" ry="9"/>
    <circle cx="-10" cy="-1" r="5"/>
    <circle cx="-3" cy="-8" r="5"/>
    <circle cx="3" cy="-8" r="5"/>
    <circle cx="10" cy="-1" r="5"/>
  </g>

  <!-- Paw prints -->
  <g fill="rgba(39,174,96,0.1)" transform="translate(292,54) rotate(15)">
    <ellipse cx="0" cy="10" rx="14" ry="12"/>
    <circle cx="-13" cy="-2" r="7"/>
    <circle cx="-4" cy="-11" r="7"/>
    <circle cx="4" cy="-11" r="7"/>
    <circle cx="13" cy="-2" r="7"/>
  </g>
  <g fill="rgba(39,174,96,0.08)" transform="translate(132,154) rotate(-12)">
    <ellipse cx="0" cy="8" rx="11" ry="9"/>
    <circle cx="-10" cy="-2" r="5"/>
    <circle cx="-3" cy="-9" r="5"/>
    <circle cx="3" cy="-9" r="5"/>
    <circle cx="10" cy="-2" r="5"/>
  </g>

  <!-- Decorative cross -->
  <g fill="rgba(39,174,96,0.1)" transform="translate(306,162)">
    <rect x="-14" y="-5" width="28" height="10" rx="3"/>
    <rect x="-5" y="-14" width="10" height="28" rx="3"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="136" cy="34" r="8" fill="rgba(39,174,96,0.08)"/>
  <circle cx="172" cy="180" r="10" fill="rgba(39,174,96,0.07)"/>
  <circle cx="46" cy="154" r="6" fill="rgba(39,174,96,0.08)"/>
  <circle cx="310" cy="168" r="5" fill="rgba(39,174,96,0.07)"/>
</svg>

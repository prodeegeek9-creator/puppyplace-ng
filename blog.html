<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Blog — PuppyPlace</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Nunito',sans-serif;background:#f8f9fa;color:#333;min-height:100vh}
a{text-decoration:none;color:inherit}
:root{
  --orange:#ed6436;--orange-d:#c9530a;
  --black:#0e0e0c;--dark:#1a1a18;
  --gray:#868686;--light:#f1f3f5;--border:#e9ecef;--white:#fff;
  --green:#2ecc71;--r:12px;
  --shadow:0 4px 20px rgba(0,0,0,.06);
  --shadow2:0 10px 30px rgba(0,0,0,.1);
  --trans:.3s cubic-bezier(0.4,0,0.2,1);
}

/* ── NAV ── */
.nav{background:var(--dark);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.nav-logo{color:#fff;font-size:22px;font-weight:900;cursor:pointer}.nav-logo span{color:var(--orange)}
.nav-back{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.85);border-radius:50px;padding:9px 20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all var(--trans)}
.nav-back:hover{background:var(--orange);border-color:var(--orange);color:#fff}

/* ── ALL POSTS PAGE ── */
.all-hero{background:var(--dark);padding:60px 40px 48px;text-align:center}
.all-hero h1{font-size:clamp(28px,5vw,48px);font-weight:900;color:#fff;margin-bottom:12px}
.all-hero p{font-size:16px;color:rgba(255,255,255,.5);max-width:480px;margin:0 auto}
.all-posts-grid{max-width:1100px;margin:0 auto;padding:48px 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
.post-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all var(--trans);box-shadow:var(--shadow);display:block}
.post-card:hover{border-color:var(--orange);transform:translateY(-4px);box-shadow:var(--shadow2)}
.post-card-img{height:180px;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative}
.post-card-cat{position:absolute;bottom:14px;left:16px;font-size:11px;font-weight:800;padding:5px 14px;border-radius:50px;text-transform:uppercase;letter-spacing:.07em;color:#fff}
.post-card-body{padding:22px}
.post-card-title{font-size:17px;font-weight:800;line-height:1.4;color:var(--black);margin-bottom:10px;transition:color var(--trans)}
.post-card:hover .post-card-title{color:var(--orange)}
.post-card-excerpt{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:14px}
.post-card-meta{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:8px}
.post-card-read{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--orange);margin-top:14px}
.empty-state{grid-column:1/-1;text-align:center;padding:80px 24px;color:var(--gray)}
.empty-state-ico{font-size:64px;margin-bottom:20px}

/* ── FOOTER ── */
.footer{background:var(--dark);color:rgba(255,255,255,.4);text-align:center;padding:32px 24px;font-size:13px}
.footer a{color:rgba(255,255,255,.6);font-weight:700}
.footer a:hover{color:var(--orange)}

/* ── SKELETON LOADER ── */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:600px){
  .nav{padding:0 20px}
  .all-hero{padding:40px 20px 32px}
  .all-posts-grid{padding:28px 16px 60px;grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo" onclick="window.location.href='index.html'">Puppy<span>Place</span></div>
  <button class="nav-back" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="M10 12L6 8l4-4"/></svg>
    Back to Shop
  </button>
</nav>

<!-- ALL POSTS -->
<div class="all-hero">
  <h1>Pet Care Blog</h1>
  <p>Expert tips, nutrition guides, health advice, and training insights for Nigerian pet owners</p>
</div>
<div class="all-posts-grid" id="allPostsGrid">
  <!-- skeleton cards while loading -->
  ${[1,2,3].map(()=>`
  <div style="background:#fff;border:1.5px solid #e9ecef;border-radius:12px;overflow:hidden">
    <div class="skeleton" style="height:180px"></div>
    <div style="padding:22px;display:flex;flex-direction:column;gap:10px">
      <div class="skeleton" style="height:20px;width:75%"></div>
      <div class="skeleton" style="height:14px;width:55%"></div>
      <div class="skeleton" style="height:14px;width:90%"></div>
    </div>
  </div>`).join('')}
</div>

<footer class="footer">
  &copy; 2025 <a href="index.html">PuppyPlace.ng</a> &mdash; Your trusted pet store in Nigeria
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
const sb = window.supabase.createClient(window.PPCONFIG.SUPABASE_URL, window.PPCONFIG.SUPABASE_ANON);

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

async function loadPosts() {
  const grid = document.getElementById('allPostsGrid');
  try {
    const { data, error } = await sb
      .from('blog_posts')
      .select('id,slug,title,category,cat_color,emoji,bg_color,excerpt,author,published_at,read_time')
      .eq('status', 'published')
      .order('published_at', { ascending: false });

    if (error) throw error;

    const posts = data || [];
    if (!posts.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-state-ico">📝</div><div style="font-size:18px;font-weight:800;margin-bottom:8px">No posts yet</div><div>Check back soon for pet care tips and guides.</div></div>`;
      return;
    }

    grid.innerHTML = posts.map(p => {
      const date = p.published_at
        ? new Date(p.published_at).toLocaleDateString('en-NG',{day:'numeric',month:'long',year:'numeric'})
        : '';
      return `
        <a class="post-card" href="/posts/${escHtml(p.slug)}.html">
          <div class="post-card-img" style="background:${escHtml(p.bg_color||'#f1f3f5')}">
            <span>${escHtml(p.emoji||'📰')}</span>
            <div class="post-card-cat" style="background:${escHtml(p.cat_color||'#ed6436')}">${escHtml(p.category||'General')}</div>
          </div>
          <div class="post-card-body">
            <div class="post-card-title">${escHtml(p.title)}</div>
            <div class="post-card-excerpt">${escHtml(p.excerpt||'')}</div>
            <div class="post-card-meta">
              <span>${escHtml(p.author||'')}</span>
              <span>·</span>
              <span>${escHtml(date)}</span>
              <span>·</span>
              <span>${escHtml(String(p.read_time||5))} min read</span>
            </div>
            <div class="post-card-read">Read article →</div>
          </div>
        </a>`;
    }).join('');
  } catch(err) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-ico">⚠️</div><div style="font-size:16px;font-weight:800;margin-bottom:8px">Could not load posts</div><div>Please check your connection and try again.</div></div>`;
    console.error('Blog load error:', err);
  }
}

loadPosts();
</script>
</body>
</html>
